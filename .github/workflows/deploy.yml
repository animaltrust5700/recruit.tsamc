name: Build and Deploy

concurrency:
  group: deploy
  cancel-in-progress: true

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      reason:
        description: 'Deploy reason'
        required: false
        default: 'Manual deploy'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        env:
          SSH_TARGET_DIR: ${{ secrets.SSH_TARGET_DIR }}
          WPGRAPHQL_ENDPOINT: ${{ vars.WPGRAPHQL_ENDPOINT }}
          PUBLIC_BUILD_ID: ${{ github.sha }}
        run: npm run build

      - name: Deploy via SSH (rsync) to Sakura Internet
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.SSH_HOST }}
          REMOTE_USER: ${{ secrets.SSH_USERNAME }}
          TARGET: ${{ secrets.SSH_TARGET_DIR }}
          SOURCE: dist/
          ARGS: >-
            --archive
            --verbose
            --compress
            --delete
            --exclude='.git*'
            --exclude='node_modules/'
            --exclude='.DS_Store'
